apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-bunkerweb
  namespace: bunkerweb
  labels:
    app: mcp-bunkerweb
    app.kubernetes.io/name: mcp-bunkerweb
    app.kubernetes.io/component: server
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mcp-bunkerweb
  template:
    metadata:
      labels:
        app: mcp-bunkerweb
        app.kubernetes.io/name: mcp-bunkerweb
        app.kubernetes.io/component: server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: mcp-bunkerweb
          image: docker.io/bunkerity/mcp-bunkerweb:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: WORKERS
              value: "4"
          envFrom:
            - configMapRef:
                name: mcp-bunkerweb-config
            - secretRef:
                name: mcp-bunkerweb-secrets
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
      terminationGracePeriodSeconds: 30
