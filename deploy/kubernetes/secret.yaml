# Kubernetes Secrets for MCP BunkerWeb Server
#
# IMPORTANT: This is an EXAMPLE file for documentation purposes.
# DO NOT commit real secrets to version control.
#
# Usage:
# 1. Copy this file: cp secret.yaml secret.local.yaml
# 2. Replace placeholder values with your actual secrets
# 3. Apply to cluster: kubectl apply -f secret.local.yaml
# 4. Add secret.local.yaml to .gitignore

apiVersion: v1
kind: Secret
metadata:
  name: mcp-bunkerweb-secrets
  namespace: bunkerweb
  labels:
    app: mcp-bunkerweb
    app.kubernetes.io/name: mcp-bunkerweb
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # BunkerWeb API Authentication
  # Use either API token OR Basic auth (not both)

  # Option 1: Bearer Token Authentication (Recommended)
  BUNKERWEB_API_TOKEN: "your-secret-api-token-here"

  # Option 2: HTTP Basic Authentication
  # BUNKERWEB_BASIC_USERNAME: "admin"
  # BUNKERWEB_BASIC_PASSWORD: "your-secret-password-here"

  # MCP WebSocket Authentication (Optional)
  # Shared secret for WebSocket clients
  # BUNKERWEB_WEBSOCKET_TOKEN: "your-websocket-secret-here"
