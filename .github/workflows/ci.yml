name: CI

permissions: read-all

on:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/
      - name: Type check
        run: mypy src/ --strict
      - name: Security scan
        run: bandit -r src/ -ll

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        run: pytest

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          languages: python
      - name: Analyze
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3

  container-arm64:
    name: Container (ARM64)
    needs: [tests, codeql]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: arm64
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          load: true
          tags: local/bunkerweb-mcp:arm64
          cache-from: type=gha,scope=bunkerweb-mcp-arm64
          cache-to: type=gha,mode=max,scope=bunkerweb-mcp-arm64
      - name: Start container
        run: |
          docker run --detach --name bunkerweb-mcp-arm64 --platform linux/arm64 \
            --env SEARCH_MODE=disabled \
            --env MCP_ALLOWED_HOSTS=localhost,localhost:8080,127.0.0.1,127.0.0.1:8080 \
            --publish 8080:8080 local/bunkerweb-mcp:arm64
      - name: Check health
        run: |
          for _ in {1..60}; do
            if curl --fail --silent http://127.0.0.1:8080/health; then
              exit 0
            fi
            sleep 1
          done
          exit 1
      - name: Generate Trivy report
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: local/bunkerweb-mcp:arm64
          scanners: vuln
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-arm64.sarif
          exit-code: "0"
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
      - name: Upload Trivy results
        if: ${{ always() && hashFiles('trivy-arm64.sarif') != '' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: trivy-arm64.sarif
          category: trivy-container-arm64
      - name: Trivy gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: local/bunkerweb-mcp:arm64
          scanners: vuln
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: "1"
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
      - name: Show container logs on failure
        if: failure()
        continue-on-error: true
        run: docker logs bunkerweb-mcp-arm64
      - name: Remove container
        if: always()
        continue-on-error: true
        run: docker rm --force bunkerweb-mcp-arm64

  docker:
    name: Container (AMD64 and publish)
    needs: [tests, codeql, container-arm64]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: bunkerity/bunkerweb-mcp
          tags: |
            type=sha
            type=raw,value=latest
      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=bunkerweb-mcp-amd64
          cache-to: type=gha,mode=max,scope=bunkerweb-mcp-amd64
      - name: Start container
        run: |
          docker run --detach --name bunkerweb-mcp-amd64 --platform linux/amd64 \
            --env SEARCH_MODE=disabled \
            --env MCP_ALLOWED_HOSTS=localhost,localhost:8080,127.0.0.1,127.0.0.1:8080 \
            --publish 8080:8080 bunkerity/bunkerweb-mcp:latest
      - name: Check health
        run: |
          for _ in {1..60}; do
            if curl --fail --silent http://127.0.0.1:8080/health; then
              exit 0
            fi
            sleep 1
          done
          exit 1
      - name: Generate Trivy report
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: bunkerity/bunkerweb-mcp:latest
          scanners: vuln
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-amd64.sarif
          exit-code: "0"
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
      - name: Upload Trivy results
        if: ${{ always() && hashFiles('trivy-amd64.sarif') != '' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: trivy-amd64.sarif
          category: trivy-container-amd64
      - name: Trivy gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: bunkerity/bunkerweb-mcp:latest
          scanners: vuln
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          exit-code: "1"
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Push image
        run: docker push --all-tags bunkerity/bunkerweb-mcp
      - name: Show container logs on failure
        if: failure()
        continue-on-error: true
        run: docker logs bunkerweb-mcp-amd64
      - name: Remove container
        if: always()
        continue-on-error: true
        run: docker rm --force bunkerweb-mcp-amd64
